<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Oskys Bar ¡Viva El Alcohol!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            background: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', 'Impact', sans-serif;
        }
        #game-container {
            position: relative; width: 100%; height: 100%;
            max-width: 450px; max-height: 800px; aspect-ratio: 9 / 16;
            border: 4px solid #d4af37; background: #050505;
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8), 0 0 30px rgba(212, 175, 55, 0.3);
        }
        canvas { width: 100%; height: 100%; display: block; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.92); color: #fff; text-align: center; z-index: 10; padding: 30px;
        }
        h1 { color: #f1c40f; text-shadow: 3px 3px #e74c3c, 0 0 20px rgba(241, 196, 15, 0.5); font-size: 2.8rem; line-height: 1; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .grid-select { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .bottle-btn {
            background: #1a1a1a; color: #d4af37; border: 2px solid #d4af37;
            padding: 12px 5px; border-radius: 8px; cursor: pointer;
            font-family: 'Impact'; font-size: 1rem; transition: 0.3s;
        }
        .bottle-btn:hover { background: #d4af37; color: #000; transform: translateY(-3px); }
        .main-btn {
            padding: 15px 40px; font-size: 1.8rem; background: #c0392b;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 6px #7b241c; margin-top: 20px; text-transform: uppercase;
            transition: 0.2s;
        }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 2px #7b241c; }
        .hidden { display: none !important; }
        .status-bar { 
            position: absolute; top: 140px; left: 0; width: 100%; 
            text-align: center; color: #f1c40f; font-size: 1.4rem; 
            font-weight: bold; pointer-events: none; text-shadow: 0 0 10px #000;
            z-index: 5; letter-spacing: 2px;
        }
        #game-container::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.5) 100%);
        }

        /* =========================================
           🔥 DISEÑO RESPONSIVO PARA SCORE (NUEVO)
           Evita que los datos del GameOver se amontonen en pantallas pequeñas.
        =========================================== */
        #over-score-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            max-width: 320px;
            margin: 15px 0;
            gap: 30px;
        }

        .score-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #f1c40f;
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-number {
            font-size: 2.2rem;
            color: white;
            font-family: 'Impact', sans-serif;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        /* ========================================= */
    </style>
</head>
<body>

<div id="game-container">
    <div id="status" class="status-bar"></div>
    <canvas id="game"></canvas>
    
    <div id="menu-start" class="overlay">
        <h1>FLAPPY<br>CANTINA</h1>
        <button class="main-btn" onclick="showSelection()">ENTRAR A LA CANTINA</button>
    </div>

    <div id="menu-select" class="overlay hidden">
        <h2 style="color: #d4af37; margin-bottom: 20px;">¿QUÉ TE VAS A CHINGAR?</h2>
        <div class="grid-select">
            <button class="bottle-btn" onclick="setBottle('tequila')">UN TEQUILITA</button>
            <button class="bottle-btn" onclick="setBottle('bacacho')">UN BACACHITO</button>
            <button class="bottle-btn" onclick="setBottle('vodka')">UN VODKITA</button>
            <button class="bottle-btn" onclick="setBottle('whisky')">UN WHISKY</button>
            <button class="bottle-btn" onclick="setBottle('mezcal')">UN MEZCALITO</button>
            <button class="bottle-btn" onclick="setBottle('brandy')">UN BRANDY</button>
            <button class="bottle-btn" onclick="setBottle('caguama')">LA CAGUAMITA</button>
        </div>
    </div>

    <div id="menu-over" class="overlay hidden">
        <h1 id="over-title">¡MAMASTE!</h1>
        <p id="over-msg" style="font-style: italic; margin: 10px 0; min-height: 50px;"></p>
        
        <div id="over-score-container">
            <div class="score-block">
                <span>PUNTOS</span>
                <span id="current-score-over" class="score-number">0</span>
            </div>
            <div class="score-block">
                <span>RÉCORD</span>
                <span id="high-score-over" class="score-number">0</span>
            </div>
        </div>
        <div id="over-coins" style="color:#d4af37; font-size:1.1rem; margin-bottom: 10px;"></div>
        <button class="main-btn" onclick="showSelection()">CAMBIAR BEBIDA</button>
        <button class="main-btn" style="background:#27ae60; box-shadow:0 6px #1e8449;" onclick="startGame()">¡OTRA RONDA!</button>
    </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = 400, H = 711;
canvas.width = W; canvas.height = H;

const BOTTLE_DATA = {
    tequila: { 
        img: new Image(), 
        frases: [
            "¡Ya valiste madre, el tequila te revolcó!",
            "¡Ese shot te puso bien pendejo, ni lo sentiste!",
            "¡Ya andas diciendo pura mamada, bájale!",
            "¡Te pegó tan recio que ya hasta cantas mal!"
        ] 
    },
    bacacho: { 
        img: new Image(), 
        frases: [
            "¡El Bacacho te dejó bien pinche cruzado!",
            "¡Ya estás bien necio, ni quién te aguante!",
            "¡Te sientes bien gallo pero ya estás tambaleando!",
            "¡Otro trago y te vas directo al suelo, compa!"
        ] 
    },
    vodka: { 
        img: new Image(), 
        frases: [
            "¡Eso no era agua, era putazo directo!",
            "¡Ni lo viste venir y ya te cargó el payaso!",
            "¡Ya andas bien tieso pero por dentro destruido!",
            "¡Ese vodka te aplicó la de 'tranqui' y mocos!"
        ] 
    },
    whisky: { 
        img: new Image(), 
        frases: [
            "¡Mucho whisky y ya te crees de varo, pero estás bien pedo!",
            "¡Hablas bien fino pero dices puras babosadas!",
            "¡Ya andas filosofando mamadas que ni tú entiendes!",
            "¡Te sientes elegante pero ya estás bien doblado!"
        ] 
    },
    mezcal: { 
        img: new Image(), 
        frases: [
            "¡El mezcal sí te puso una arrastrada!",
            "¡Ese gusanito te mandó derechito al piso!",
            "¡Ya estás abrazando el suelo como compa fiel!",
            "¡Te pasaste de lanza, ya ni te levantas!"
        ] 
    },
    brandy: { 
        img: new Image(), 
        frases: [
            "¡Ya andas bien intenso contando tu vida a todos!",
            "¡Ese brandy te sacó lo sentimental bien cabrón!",
            "¡Ya estás llorando por cosas que ni al caso!",
            "¡Te pusiste bien nostálgico con dos tragos!"
        ] 
    },
    caguama: { 
        img: new Image(), 
        frases: [
            "¡Te bajaste la caguama y ya valiste!",
            "¡Ya estás bien torcido y apenas vas empezando!",
            "¡Te fuiste como hilo de media, sin freno!",
            "¡Otra caguama y te desconectas, compa!"
        ], 
        scale: 0.6, 
        hitboxReduction: 12 
    }
};
Object.keys(BOTTLE_DATA).forEach(key => BOTTLE_DATA[key].img.src = key + ".png");

const POWERUP_IMGS = {
    limon: new Image(),
    shot: new Image(),
    moneda: new Image()
};
POWERUP_IMGS.limon.src = "limon.png";
POWERUP_IMGS.shot.src = "shot.png";
POWERUP_IMGS.moneda.src = "moneda.png";

const BACKGROUNDS = [
    { name: "Noche", sky: ["#02040a", "#0f081a", "#1a0b02"], starAlpha: 0.5, city: "#050505" },
    { name: "Tarde", sky: ["#e67e22", "#d35400", "#2c3e50"], starAlpha: 0, city: "#1a0a00" },
    { name: "Día", sky: ["#3498db", "#87ceeb", "#2980b9"], starAlpha: 0, city: "#2c3e50" },
    { name: "Amanecer", sky: ["#ff9a9e", "#fecfef", "#ffecd2"], starAlpha: 0.2, city: "#3d1d3d" }
];
let currentBG = BACKGROUNDS[0];

const PHRASES = ["¡ÉCHALE!", "¡OTRO!", "¡SIN MIEDO!", "¡SALUD!", "¡DALE!", "¡AY AY AY!"];

let selectedKey = 'tequila';

/* =========================
   🔥 STATE
========================= */
let state = { 
    mode: "START", score: 0, high: localStorage.getItem("ft_high") || 0, 
    frame: 0, shake: 0, scorePop: 0, timeScale: 1, invul: 0, flash: 0,
    eventTimer: 0,
    currentEvent: null,
    eventDuration: 0,
    coinsCollected: 0 // <--- NUEVO: Cuenta monedas en la partida actual
};

let bird = { x: 70, y: 300, w: 46, h: 64, v: 0, g: 0.42, j: -8.5, r: 0 };

let pipes = [], powerups = [], splinters = [], stars = [], floatingTexts = [], particles = [];
let pipeTimer = 0;
let cityX = 0;
let cityFarX = 0;

for(let i=0; i<50; i++) stars.push({x: Math.random()*W, y: Math.random()*H*0.7, s: Math.random()*2, o: Math.random()});

function showSelection() {
    document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
    document.getElementById('menu-select').classList.remove('hidden');
}

function setBottle(key) { selectedKey = key; startGame(); }

function triggerRandomEvent() {
    const events = ["desmadre", "apagon", "banda"];
    const chosen = events[Math.floor(Math.random() * events.length)];

    state.currentEvent = chosen;
    state.eventDuration = 180;
    state.eventTimer = 0;

    if (chosen === "desmadre") floatingTexts.push({x: W/2, y: H/2, txt: "¡SE ARMÓ EL DESMADRE!", l: 1.2});
    if (chosen === "apagon") floatingTexts.push({x: W/2, y: H/2, txt: "¡APAGÓN!", l: 1.2});
    if (chosen === "banda") floatingTexts.push({x: W/2, y: H/2, txt: "¡MÚSICA BANDA!", l: 1.2});
}

function startGame() {
    document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
    currentBG = BACKGROUNDS[Math.floor(Math.random() * BACKGROUNDS.length)];
    bird.y = 300; bird.v = 0; bird.r = 0;
    pipes = []; powerups = []; splinters = []; floatingTexts = []; particles = [];
    state.score = 0; state.frame = 0; state.shake = 0; state.timeScale = 1; state.invul = 0; state.flash = 0;
    state.eventTimer = 0; state.currentEvent = null; state.eventDuration = 0;
    state.coinsCollected = 0; // Reiniciamos las monedas al empezar
    pipeTimer = 0; state.mode = "PLAY";
}

function gameOver() {
    if (state.mode === "OVER" || state.invul > 0) return;

    const costoRevivir = 3; // <--- Puedes cambiar el costo aquí

    /* =========================
       🔥 MECÁNICA REVIVIR (B)
    ========================= */
    if (state.coinsCollected >= costoRevivir) {
        state.coinsCollected -= costoRevivir; // Cobra las monedas
        state.invul = 120; // Da 2 segundos de inmunidad para reaccionar
        bird.v = -6; // Un pequeño empujón arriba para despegar
        state.flash = 0.6;
        floatingTexts.push({x: W/2, y: H/2, txt: "¡EL SEGUNDO AIRE!", l: 1.5});
        return; // Detiene el game over, el jugador sigue vivo
    }

    // Si no tiene suficientes monedas, muere normalmente
    state.mode = "OVER";
    state.shake = 20;
    for(let i=0; i<30; i++) splinters.push({ x: bird.x + bird.w/2, y: bird.y + bird.h/2, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, s: Math.random()*6+2, l: 1.0 });
    setTimeout(() => {
        const data = BOTTLE_DATA[selectedKey];
        document.getElementById('over-msg').innerText = data.frases[Math.floor(Math.random()*data.frases.length)];
        
        // =========================================
        // 🔥 ACTUALIZACIÓN DE INTERFAZ (MODIFICADA)
        // Insertamos los datos en sus respectivos lugares.
        // =========================================
        document.getElementById('current-score-over').innerText = state.score;
        document.getElementById('high-score-over').innerText = state.high;
        document.getElementById('over-coins').innerHTML = `Monedas: ${state.coinsCollected}`;
        
        document.getElementById('menu-over').classList.remove('hidden');
    }, 800);
}

function createJumpParticle() {
    for(let i=0; i<5; i++) {
        particles.push({
            x: bird.x + 10, y: bird.y + bird.h - 10,
            vx: -Math.random() * 3 - 2, vy: Math.random() * 2 - 1,
            size: Math.random() * 8 + 4, l: 1.0, color: "rgba(255,255,255,0.4)"
        });
    }
}

function update() {
    if (state.mode === "OVER") {
        splinters.forEach((s, i) => { s.x += s.vx; s.y += s.vy; s.vy += 0.5; s.l -= 0.015; if(s.l <= 0) splinters.splice(i, 1); });
        return;
    }
    if (state.mode !== "PLAY") return;

    state.frame++;
    if(state.flash > 0) state.flash -= 0.1;
    cityX = (cityX - 0.5 * state.timeScale) % W;
    cityFarX = (cityFarX - 0.2 * state.timeScale) % W;
    
    if(state.scorePop > 0) state.scorePop -= 0.08;
    if(state.invul > 0) state.invul -= state.timeScale;

    state.eventTimer += state.timeScale;
    if (!state.currentEvent && state.eventTimer > 600) triggerRandomEvent();

    if (state.currentEvent) {
        state.eventDuration -= state.timeScale;
        if (state.currentEvent === "desmadre") state.shake = 15;
        if (state.currentEvent === "banda") state.timeScale = 1.25;

        if (state.eventDuration <= 0) {
            state.currentEvent = null;
            state.timeScale = 1;
            state.eventTimer = 0;
        }
    } else {
        state.shake = Math.min(8, state.score * 0.25);
    }

    canvas.style.filter = `blur(${Math.min(1.5, state.score * 0.08)}px)`;

    bird.v += bird.g * state.timeScale;
    bird.y += bird.v * state.timeScale;
    bird.r = Math.min(Math.PI/4, Math.max(-Math.PI/6, bird.v * 0.1));

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.l -= 0.02;
        if(p.l <= 0) particles.splice(i, 1);
    });

    pipeTimer += state.timeScale;
    if (pipeTimer >= 90) {
        pipeTimer = 0;
        const gap = Math.max(130, 195 - (state.score * 1.5)); 
        const top = Math.random() * (H - gap - 250) + 120;
        let win = [];
        for(let j=0; j<8; j++) win.push({y: Math.random(), side: Math.random() > 0.5});
        pipes.push({ x: W, w: 90, top: top, bottom: top + gap, passed: false, windows: win });

        if(Math.random() < 0.45) {
            let types = ['limon', 'shot', 'moneda'];
            powerups.push({ 
                x: W + 180, y: top + gap/2, 
                type: types[Math.floor(Math.random()*types.length)],
                phase: 0, size: 45 
            });
        }
    }

    const bData = BOTTLE_DATA[selectedKey];
    const hReduction = bData.hitboxReduction || 0;

    pipes.forEach(p => {
        p.x -= (3.5 + (state.score * 0.12)) * state.timeScale;
        
        if (bird.x + 10 + hReduction < p.x + p.w && bird.x + bird.w - 10 - hReduction > p.x) {
            if (bird.y + 10 + hReduction < p.top || bird.y + bird.h - 10 - hReduction > p.bottom) {
                if(state.invul <= 0) gameOver();
            }
        }
        if (!p.passed && p.x + p.w < bird.x) { 
            state.score++; p.passed = true; state.scorePop = 1.2; 
            if(state.score % 5 === 0) {
                state.flash = 0.5;
                floatingTexts.push({x: W/2, y: H/2, txt: PHRASES[Math.floor(Math.random()*PHRASES.length)], l: 1.0});
            }
            if(state.score > state.high) { state.high = state.score; localStorage.setItem("ft_high", state.high); } 
        }
    });

    powerups.forEach((pw, i) => {
        pw.x -= (3.5 + (state.score * 0.12)) * state.timeScale;
        pw.phase += 0.1;
        let dx = (bird.x + bird.w/2) - pw.x;
        let dy = (bird.y + bird.h/2) - (pw.y + Math.sin(pw.phase)*15);
        if(Math.sqrt(dx*dx + dy*dy) < 45) {
            state.flash = 0.4;
            if(pw.type === 'limon') { state.timeScale = 0.7; setTimeout(()=>state.timeScale=1, 5000); }
            if(pw.type === 'shot') state.invul = 280; 
            if(pw.type === 'moneda') { 
                state.coinsCollected++; // <--- Gana una moneda
                floatingTexts.push({x: pw.x, y: pw.y, txt: "+1 ", l: 1.0}); // Muestra el texto flotante de la moneda
            }
            powerups.splice(i, 1);
        }
    });

    floatingTexts.forEach((t, i) => { t.y -= 2; t.l -= 0.02; if(t.l <= 0) floatingTexts.splice(i, 1); });
    if (pipes[0]?.x < -120) pipes.shift();
    if (powerups[0]?.x < -100) powerups.shift();
    if (bird.y + bird.h > H || bird.y < -50) gameOver();
    
    let statusText = "";
    if(state.invul > 0) statusText = "¡INMORTAL KABRON! ";
    else if(state.timeScale < 1) statusText = "DATE UN BAJON.";
    document.getElementById('status').innerText = statusText;
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    let twist = Math.sin(state.frame * 0.015) * Math.min(0.04, state.score * 0.003);
    let dx = Math.sin(state.frame * 0.1) * state.shake, dy = Math.cos(state.frame * 0.1) * state.shake;
    
    ctx.save();
    ctx.translate(W/2 + dx, H/2 + dy);
    ctx.rotate(twist);
    ctx.translate(-W/2, -H/2);

    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, currentBG.sky[0]); 
    sky.addColorStop(0.6, currentBG.sky[1]); 
    sky.addColorStop(1, currentBG.sky[2]);
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
    
    if(currentBG.starAlpha > 0) {
        stars.forEach(s => {
            ctx.fillStyle = `rgba(255, 255, 255, ${s.o * (currentBG.starAlpha + Math.sin(state.frame*0.05)*currentBG.starAlpha)})`;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
        });
    }

    ctx.fillStyle = "rgba(0,0,0,0.3)";
    for(let i=0; i<3; i++) {
        ctx.fillRect(cityFarX + (i*W) + 50, H-200, 60, 200);
        ctx.fillRect(cityFarX + (i*W) + 200, H-250, 40, 250);
    }

    ctx.fillStyle = currentBG.city;
    for(let i=0; i<3; i++) {
        ctx.fillRect(cityX + (i*W), H-150, 100, 150);
        ctx.fillRect(cityX + (i*W) + 150, H-120, 80, 120);
    }

    pipes.forEach(p => {
        ctx.fillStyle = "#0e0e0e";
        ctx.fillRect(p.x, 0, p.w, p.top);
        ctx.fillRect(p.x, p.bottom, p.w, H - p.bottom);
        ctx.fillStyle = "rgba(241, 196, 15, 0.2)";
        p.windows.forEach(w => {
            let wx = w.side ? p.x + 15 : p.x + p.w - 30;
            ctx.fillRect(wx, w.y * (p.top-30)+15, 12, 8);
            ctx.fillRect(wx, p.bottom + 15 + (w.y * (H-p.bottom-30)), 12, 8);
        });
        ctx.fillStyle = state.invul > 0 ? "#e74c3c" : "#d4af37";
        ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
        ctx.fillRect(p.x - 5, p.top - 18, p.w + 10, 18);
        ctx.fillRect(p.x - 5, p.bottom, p.w + 10, 18);
        ctx.shadowBlur = 0;
    });

    particles.forEach(p => {
        ctx.fillStyle = `rgba(255,255,255, ${p.l})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    });

    powerups.forEach(pw => {
        let img = POWERUP_IMGS[pw.type];
        if(img.complete) {
            ctx.save();
            ctx.shadowBlur = 25; 
            ctx.shadowColor = pw.type === 'shot' ? "#ff0000" : (pw.type === 'limon' ? "#ffffff" : "#f1c40f");
            let floatY = Math.sin(pw.phase) * 15;
            ctx.drawImage(img, pw.x - pw.size/2, (pw.y + floatY) - pw.size/2, pw.size, pw.size);
            ctx.restore();
        }
    });

    const bData = BOTTLE_DATA[selectedKey];
    const bImg = bData.img;
    if(bImg.complete && state.mode !== "OVER") {
        ctx.save();
        ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
        ctx.rotate(bird.r);
        if(state.invul > 0) { 
            ctx.shadowColor = "#ff0000"; ctx.shadowBlur = 30;
            ctx.scale(1.1, 1.1);
        }
        
        let scale = bData.scale || 1;
        let drawW = bird.w * scale;
        let drawH = bird.h * scale;
        ctx.drawImage(bImg, -drawW/2, -drawH/2, drawW, drawH);
        ctx.restore();
    }

    floatingTexts.forEach(t => {
        ctx.fillStyle = `rgba(255, 255, 255, ${t.l})`;
        ctx.font = "bold 50px Impact"; ctx.textAlign = "center";
        ctx.fillText(t.txt, t.x, t.y);
    });

    splinters.forEach(s => { ctx.fillStyle = `rgba(255, 255, 255, ${s.l})`; ctx.fillRect(s.x, s.y, s.s, s.s); });

    if(state.flash > 0) {
        ctx.fillStyle = `rgba(255,255,255,${state.flash})`;
        ctx.fillRect(0,0,W,H);
    }

    if (state.currentEvent === "apagon") {
        ctx.fillStyle = "rgba(0,0,0,0.75)";
        ctx.fillRect(0, 0, W, H);
    }

    ctx.fillStyle = state.scorePop > 0.5 ? "#f1c40f" : "white";
    ctx.font = `bold ${65 + state.scorePop * 20}px Impact`;
    ctx.textAlign = "center"; 
    ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 10;
    ctx.fillText(state.score, W/2, 100);
    ctx.shadowBlur = 0;

    /* =========================
       🔥 DIBUJAR MONEDAS ACTUALES
    ========================= */
    if (state.mode === "PLAY") {
        ctx.fillStyle = "#d4af37";
        ctx.font = "bold 20px Impact";
        ctx.textAlign = "right";
        ctx.fillText(`${state.coinsCollected}`, W - 20, 40);
    }

    ctx.restore();
    requestAnimationFrame(draw);
    update();
}

function jump(e) { 
    if(e.type === "touchstart") e.preventDefault(); 
    if (state.mode === "PLAY") {
        bird.v = bird.j;
        createJumpParticle();
    }
}
window.addEventListener("keydown", (e) => { if(e.code === "Space") jump(e); });
canvas.addEventListener("touchstart", jump, {passive: false});
canvas.addEventListener("mousedown", (e) => { if(!('ontouchstart' in window)) jump(e); });
draw();
</script>
</body>
</html>
